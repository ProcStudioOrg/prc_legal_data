name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
            cd /home/brpl/code/prc_legal_data

            echo "--- Pulling latest code ---"
            git fetch origin
            git reset --hard origin/main

            echo "--- Installing dependencies ---"
            bundle install --deployment --without development test

            echo "--- Running migrations ---"
            RAILS_ENV=production bin/rails db:migrate

            echo "--- Restarting app ---"
            sudo systemctl restart legal_data_api

            sleep 2
            if sudo systemctl is-active --quiet legal_data_api; then
              echo "Deploy successful — legal_data_api is running"
            else
              echo "ERROR: legal_data_api failed to start"
              sudo journalctl -u legal_data_api --no-pager -n 20
              exit 1
            fi
