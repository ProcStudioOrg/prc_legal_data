# =============================================================================
# NGINX config for Legal Data API
# Handles: SSL termination, rate limiting, CORS, security headers, IP blocking
# =============================================================================

# --- Rate limiting zones ---
# General API: 10 requests/sec per IP
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
# Auth/login attempts: 5 per minute per IP
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
# Write operations: 30 per minute per IP
limit_req_zone $binary_remote_addr zone=api_write:10m rate=30r/m;

# --- Upstream ---
upstream legal_data_api {
    server 127.0.0.1:3000;
}

# --- Redirect HTTP -> HTTPS (enable after certbot) ---
# server {
#     listen 80;
#     server_name yourdomain.com;
#     return 301 https://$server_name$request_uri;
# }

# --- Main server block ---
# Start with HTTP on port 80. After running certbot, it will auto-configure SSL.
server {
    listen 80;
    # server_name yourdomain.com;  # Uncomment and set your domain

    # --- Security headers (delegated from Rails) ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    # Uncomment after enabling SSL:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Request size limit ---
    client_max_body_size 10M;

    # --- CORS (delegated from Rails) ---
    # Adjust allowed origins as needed
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost|yourdomain\.com)") {
        set $cors_origin $http_origin;
    }

    # --- IP blocklist (add IPs as needed) ---
    # deny 1.2.3.4;
    # deny 5.6.7.0/24;

    # --- Country blocking (requires ngx_http_geoip2_module) ---
    # Uncomment and configure if geoip2 module is installed:
    # if ($geoip2_data_country_code = "XX") { return 403; }

    # --- Health check (no rate limit, no auth) ---
    location /up {
        proxy_pass http://legal_data_api;
    }

    # --- API: Read endpoints (GET) ---
    location /api/ {
        # Rate limit: 10 req/s with burst of 20
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        # CORS headers
        if ($cors_origin != "") {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "X-API-KEY, Content-Type, Accept" always;
            add_header Access-Control-Max-Age 86400 always;
        }

        # Preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "X-API-KEY, Content-Type, Accept" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://legal_data_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # --- Write endpoints: stricter rate limit ---
    location ~ ^/api/v1/(lawyer/create|lawyer/.+/update|lawyer/.+/crm|society/create|society/.+/update|lawyer_societies) {
        # Only applies to POST/PUT/PATCH/DELETE — GET falls through to general
        limit_req zone=api_write burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://legal_data_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # --- Block everything else ---
    location / {
        return 404;
    }

    # --- Logging ---
    access_log /var/log/nginx/legal_data_api_access.log;
    error_log /var/log/nginx/legal_data_api_error.log;
}
